<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <style>
      .grid-line {
        stroke: #9e9fa1;
        stroke-opacity: 1;
        stroke-width: 0.8;
        stroke-dasharray: 8 6;
      }
    </style>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <line class="grid-line" x1="40" y1="0" x2="40" y2="40"/>
      <line class="grid-line" x1="0" y1="40" x2="40" y2="40"/>
    </pattern>

    <!-- Radijalni gradient koji maskira grid — vidljiv samo u sredini dole -->
    <radialGradient id="mask-grad" cx="50%" cy="100%" r="55%" fx="50%" fy="100%">
      <stop offset="0%"  stop-color="white" stop-opacity="1"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <mask id="grid-mask">
      <rect width="400" height="300" fill="url(#mask-grad)"/>
    </mask>
  </defs>

  <!-- Pozadina -->
  <rect width="400" height="300" fill="transparent"/>

  <!-- Grid sa maskom -->
  <rect width="400" height="300" fill="url(#grid)" mask="url(#grid-mask)"/>
</svg>